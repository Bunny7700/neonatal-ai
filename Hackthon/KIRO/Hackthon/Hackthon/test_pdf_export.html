<!DOCTYPE html>
<html>
<head>
    <title>PDF Export Test</title>
</head>
<body>
    <h1>PDF Export Test</h1>
    <button id="testBtn">Test PDF Export</button>
    <div id="status"></div>
    
    <script>
        document.getElementById('testBtn').addEventListener('click', async () => {
            const status = document.getElementById('status');
            status.textContent = 'Sending request...';
            
            // Simulate detection data
            const testData = {
                cry_type: 'hunger',
                confidence: 85.5,
                intensity: 65,
                timestamp: Date.now() / 1000,
                features: {
                    pitch: 425.3,
                    pitch_std: 32.1,
                    intensity_db: -25.4,
                    spectral_centroid: 1850.2,
                    zero_crossing_rate: 0.08,
                    duration: 2.5
                }
            };
            
            console.log('Sending:', testData);
            
            try {
                const response = await fetch('http://127.0.0.1:5000/api/generate_report', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(testData)
                });
                
                console.log('Response status:', response.status);
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Failed');
                }
                
                const blob = await response.blob();
                console.log('Received blob:', blob.size, 'bytes');
                
                // Download
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'test_report.pdf';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
                
                status.textContent = 'Success! PDF downloaded';
                status.style.color = 'green';
            } catch (error) {
                console.error('Error:', error);
                status.textContent = 'Error: ' + error.message;
                status.style.color = 'red';
            }
        });
    </script>
</body>
</html>
